name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the leading v
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: 24.14.0
  PNPM_VERSION: 11

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ "$VERSION" =~ -(alpha|beta|rc|next) ]]; then
            NPM_TAG="${BASH_REMATCH[1]}"
          else
            NPM_TAG="latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Build package
        run: pnpm build

      - name: Build playground
        run: VITE_BASE_PATH=/datasourcekit/playground/ pnpm playground:build

      - name: Pack package
        run: pnpm pack --pack-destination artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ./* > checksums.txt
          cat checksums.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: datasourcekit-release
          path: |
            dist/
            artifacts/
          if-no-files-found: error

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Set package version
        run: npm version "${{ needs.build.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: datasourcekit-release
          path: .

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --tag "${{ needs.build.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-npm
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: datasourcekit-release
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: |
            release-artifacts/artifacts/*.tgz
            release-artifacts/artifacts/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
